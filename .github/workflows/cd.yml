name: CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Build & push one image per service in parallel ──────────────────────────
  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - iam-service
          - banking-core-service
          - onboarding-service
          - kyc-service
          - aml-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Update image tags in k8s manifests and commit back ──────────────────────
  # ArgoCD detects the commit and syncs the cluster automatically.
  update-manifests:
    name: Update K8s image tags
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update image tags in deployment manifests
        run: |
          SHORT_SHA=${{ steps.sha.outputs.short }}
          for svc in iam-service banking-core-service onboarding-service kyc-service aml-service notification-service; do
            sed -i "s|ghcr.io/${{ github.repository_owner }}/${svc}:.*|ghcr.io/${{ github.repository_owner }}/${svc}:${SHORT_SHA}|g" \
              k8s/services/${svc}/deployment.yaml
          done

      - name: Commit and push manifest updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/services/*/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ steps.sha.outputs.short }} [skip ci]"
          git push
