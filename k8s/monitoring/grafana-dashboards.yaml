apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  k8s-pods.json: |
    {
      "title": "Odyssey Bank - K8s Overview",
      "uid": "odyssey-k8s",
      "schemaVersion": 36,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "title": "Running Pods (banking)",
          "type": "stat",
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{namespace=\"banking\",phase=\"Running\"})",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {
                    "color": "red",
                    "value": 0
                  },
                  {
                    "color": "yellow",
                    "value": 4
                  },
                  {
                    "color": "green",
                    "value": 6
                  }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 0
          },
          "title": "Total Restarts (banking)",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"banking\"})",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "yellow",
                    "value": 5
                  },
                  {
                    "color": "red",
                    "value": 20
                  }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "gridPos": {
            "h": 4,
            "w": 8,
            "x": 8,
            "y": 0
          },
          "title": "Cluster CPU %",
          "type": "gauge",
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[2m])) * 100)",
              "legendFormat": "CPU"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "gridPos": {
            "h": 4,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "title": "Cluster Memory %",
          "type": "gauge",
          "targets": [
            {
              "expr": "100 * (1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes))",
              "legendFormat": "Memory"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "yellow",
                    "value": 75
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "title": "Pod CPU (banking)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"banking\",container!=\"\",container!=\"POD\"}[2m])) by (container)",
              "legendFormat": "{{container}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            }
          }
        },
        {
          "id": 6,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "title": "Pod Memory (banking)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"banking\",container!=\"\",container!=\"POD\"}) by (container)",
              "legendFormat": "{{container}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          }
        },
        {
          "id": 7,
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 12
          },
          "title": "Pod Restarts Over Time",
          "type": "timeseries",
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"banking\"}[5m])",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          }
        },
        {
          "id": 8,
          "gridPos": {
            "h": 6,
            "w": 12,
            "x": 0,
            "y": 18
          },
          "title": "Node CPU % by Node",
          "type": "timeseries",
          "targets": [
            {
              "expr": "100 - (rate(node_cpu_seconds_total{mode=\"idle\"}[2m]) * 100)",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            }
          }
        },
        {
          "id": 9,
          "gridPos": {
            "h": 6,
            "w": 12,
            "x": 12,
            "y": 18
          },
          "title": "Node Memory Available",
          "type": "timeseries",
          "targets": [
            {
              "expr": "node_memory_MemAvailable_bytes",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          }
        },
        {
          "id": 10,
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 24
          },
          "title": "HTTP Request Rate (Spring Boot)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count[2m])) by (service, uri, status)",
              "legendFormat": "{{service}} {{uri}} [{{status}}]"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          }
        },
        {
          "id": 11,
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 30
          },
          "title": "HTTP p99 Latency (Spring Boot)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[2m])) by (le, service, uri))",
              "legendFormat": "p99 {{service}} {{uri}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          }
        }
      ]
    }
