# Shared secrets referenced by all services.
# In production replace these with External Secrets Operator pulling from AWS Secrets Manager.
apiVersion: v1
kind: Secret
metadata:
  name: banking-db-secret
  namespace: banking
type: Opaque
stringData:
  DB_URL: jdbc:postgresql://postgres:5432/banking
  DB_USERNAME: banking
  DB_PASSWORD: banking
---
apiVersion: v1
kind: Secret
metadata:
  name: banking-jwt-secret
  namespace: banking
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-prod-must-be-at-least-256-bits-long-and-random"
