apiVersion: apps/v1
kind: Deployment
metadata:
  name: iam-service
  namespace: banking
  labels:
    app: iam-service
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iam-service
  template:
    metadata:
      labels:
        app: iam-service
    spec:
      containers:
        - name: iam-service
          # CD pipeline updates this tag on every merge to main
          image: ghcr.io/odyssey-lab-v0/iam-service:00a1f25
          ports:
            - containerPort: 8081
          envFrom:
            - secretRef:
                name: banking-db-secret
            - secretRef:
                name: banking-jwt-secret
            - configMapRef:
                name: iam-service-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
