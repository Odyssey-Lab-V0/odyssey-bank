apiVersion: apps/v1
kind: Deployment
metadata:
  name: aml-service
  namespace: banking
  labels:
    app: aml-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aml-service
  template:
    metadata:
      labels:
        app: aml-service
    spec:
      containers:
        - name: aml-service
          image: ghcr.io/odyssey-lab-v0/aml-service:2dcb04f
          ports:
            - containerPort: 8085
          envFrom:
            - secretRef:
                name: banking-db-secret
            - configMapRef:
                name: aml-service-config
            - secretRef:
                name: aiven-kafka-spring-ssl
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            periodSeconds: 15
          volumeMounts:
            - name: kafka-ssl
              mountPath: /etc/kafka-ssl
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: kafka-ssl
          secret:
            secretName: aiven-kafka-ssl
