# Zookeeper
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: banking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.6.1
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
          readinessProbe:
            exec:
              command: [sh, -c, "echo ruok | nc localhost 2181"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: banking
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
      targetPort: 2181
---
# Kafka — proxies to Kafka running on the host machine (Docker Desktop host IP)
apiVersion: v1
kind: Endpoints
metadata:
  name: kafka
  namespace: banking
subsets:
  - addresses:
      - ip: 192.168.65.254
    ports:
      - port: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: banking
spec:
  ports:
    - port: 9092
      targetPort: 9092
