server:
  port: 8085

spring:
  application:
    name: aml-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/banking}
    username: ${DB_USERNAME:banking}
    password: ${DB_PASSWORD:banking}
    hikari:
      schema: kyc_aml
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: kyc_aml
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: false   # kyc_aml schema owned by kyc-service — AML has no DDL

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    security:
      protocol: \${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
    ssl:
      key-store-type: \${KAFKA_SSL_KEYSTORE_TYPE:PEM}
      trust-store-type: \${KAFKA_SSL_TRUSTSTORE_TYPE:PEM}
      key-store-location: \${KAFKA_SSL_KEY_LOCATION:}
      certificate-chain-location: \${KAFKA_SSL_CERTIFICATE_LOCATION:}
      trust-store-location: \${KAFKA_SSL_CA_LOCATION:}
    consumer:
      group-id: aml-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    listener:
      ack-mode: RECORD
      observation-enabled: true
    template:
      observation-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans


logging:
  level:
    com.banking: DEBUG
