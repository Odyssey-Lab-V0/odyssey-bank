server:
  port: 8081

spring:
  application:
    name: iam-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/banking}
    username: ${DB_USERNAME:banking}
    password: ${DB_PASSWORD:banking}
    hikari:
      schema: iam
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema — Hibernate must not modify it
    properties:
      hibernate:
        default_schema: iam
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

  flyway:
    schemas: iam
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: iam-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    listener:
      ack-mode: RECORD
      observation-enabled: true
    template:
      observation-enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# JWT configuration
jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-must-be-256-bits}
  access-token-expiry-minutes: 15
  refresh-token-expiry-days: 7

# Kafka topics
kafka:
  topics:
    user-registered: banking.iam.user.registered.v1
    user-status-changed: banking.iam.user.status-changed.v1

# Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

# Zipkin
spring.zipkin:
  base-url: http://localhost:9411

logging:
  level:
    com.banking: DEBUG
    org.springframework.security: INFO
